name: Clean production documentation

on:
  push:
    branches:
      - vercel-guard

permissions:
  contents: write

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: vercel-guard
          fetch-depth: 0

      - name: Clean configured URL instructions
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          production = "https://funding-data-room-copilot.vercel.app"
          gpt = "https://chatgpt.com/g/g-6a580c6ec5648191a2d27f4528015f3f-funding-data-room-copilot"

          path = Path("actions/no-auth/README.md")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              f"Replace `{production}` with the production Vercel domain before adding the schema to GPT Builder.",
              f"Production OpenAPI server: `{production}`."
          )
          path.write_text(text, encoding="utf-8")

          path = Path("actions/no-auth/docs/no-auth-actions.md")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              f"3. Replace `{production}` with the production domain.",
              f"3. Confirm the OpenAPI server is `{production}`."
          )
          path.write_text(text, encoding="utf-8")

          path = Path("site/README.md")
          text = path.read_text(encoding="utf-8")
          old_cta = f'''## Funding Data Room Copilot CTA

Edit the configuration object near the top of:

```text
site/script.js
```

Replace:

```text
{gpt}
```

with the Funding Data Room Copilot Custom GPT URL.

The previously supplied Agent Launch Site Builder URL is the site-building GPT, not the product CTA, so it is not used as the Funding Data Room Copilot launch destination.'''
          new_cta = f'''## Funding Data Room Copilot CTA

The production Custom GPT URL is configured in `site/script.js`:

```text
{gpt}
```

The Agent Launch Site Builder URL is a separate build tool and is not used as the product CTA.'''
          text = text.replace(old_cta, new_cta)

          old_domain = f'''## Production Domain

Replace every occurrence of:

```text
{production}
```

after the controlled Vercel production deployment.

This updates canonical URLs, Open Graph URLs, social-image URLs, and JSON-LD page URLs.'''
          new_domain = f'''## Production Domain

The production domain is configured as:

```text
{production}/
```

Canonical URLs, Open Graph URLs, social-image URLs, JSON-LD URLs, schemas, and the OpenAPI server use this domain.'''
          text = text.replace(old_domain, new_domain)
          path.write_text(text, encoding="utf-8")

          path = Path("knowledge/builder-prompts/master-prompt-build-funding-data-room-copilot-no-auth-actions.md")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              "- one server placeholder using:\n  - `https://funding-data-room-copilot.vercel.app`",
              "- one production server using:\n  - `https://funding-data-room-copilot.vercel.app`"
          )
          path.write_text(text, encoding="utf-8")

          workflow = Path(".github/workflows/cleanup-production-docs.yml")
          if workflow.exists():
              workflow.unlink()
          PY

      - name: Validate documentation cleanup
        shell: bash
        run: |
          if grep -RIn --exclude-dir=.git -E 'YOUR-VERCEL-DOMAIN|REPLACE-WITH-FUNDING-DATA-ROOM-COPILOT|Replace `https://funding-data-room-copilot.vercel.app` with the production' .; then
            echo "Documentation cleanup validation failed."
            exit 1
          fi

      - name: Commit cleanup
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs: finalize configured production URLs"
          git push origin HEAD:vercel-guard
