name: Configure production URLs

on:
  push:
    branches:
      - chore/configure-production-urls-and-deploy-guard

permissions:
  contents: write

jobs:
  configure:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out guarded branch
        uses: actions/checkout@v4
        with:
          ref: chore/configure-production-urls-and-deploy-guard
          fetch-depth: 0

      - name: Apply production configuration
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import json

          old_domain = "https://YOUR-VERCEL-DOMAIN.vercel.app"
          production = "https://funding-data-room-copilot.vercel.app"
          old_gpt = "https://chatgpt.com/g/REPLACE-WITH-FUNDING-DATA-ROOM-COPILOT"
          production_gpt = "https://chatgpt.com/g/g-6a580c6ec5648191a2d27f4528015f3f-funding-data-room-copilot"

          text_suffixes = {".html", ".js", ".md", ".yaml", ".yml", ".json"}
          for path in Path(".").rglob("*"):
              if not path.is_file() or ".git" in path.parts or path.suffix.lower() not in text_suffixes:
                  continue
              text = path.read_text(encoding="utf-8")
              updated = text.replace(old_gpt, production_gpt)
              updated = updated.replace(old_domain + "/site/index.html", production + "/")
              updated = updated.replace(old_domain + "/site/pages/", production + "/pages/")
              updated = updated.replace(old_domain + "/site/tools/", production + "/tools/")
              updated = updated.replace(old_domain + "/site/", production + "/")
              updated = updated.replace(old_domain + "/assets/", production + "/assets/")
              updated = updated.replace(old_domain, production)
              if updated != text:
                  path.write_text(updated, encoding="utf-8")

          root_readme = Path("README.md")
          text = root_readme.read_text(encoding="utf-8")
          text = text.replace(
              f"Replace `{production}` with the production Vercel domain before adding the schema to GPT Builder.",
              f"Production OpenAPI server: `{production}`."
          )
          root_readme.write_text(text, encoding="utf-8")

          site_readme = Path("site/README.md")
          text = site_readme.read_text(encoding="utf-8")
          text = text.replace("## Configure the GPT CTA", "## Funding Data Room Copilot CTA")
          text = text.replace("## Configure the Production Domain", "## Production Domain")
          text = text.replace("- [ ] Replace the Custom GPT URL placeholder", "- [x] Configure the Custom GPT URL")
          text = text.replace("- [ ] Replace the Vercel domain placeholder", "- [x] Configure the Vercel production domain")
          site_readme.write_text(text, encoding="utf-8")

          openapi = Path("actions/no-auth/openapi/no-auth-actions.openapi.yaml")
          text = openapi.read_text(encoding="utf-8")
          text = text.replace(
              "description: Replace with the deployed Vercel production domain.",
              "description: Funding Data Room Copilot production server."
          )
          openapi.write_text(text, encoding="utf-8")

          validation_path = Path("site/data/build-validation.json")
          validation = json.loads(validation_path.read_text(encoding="utf-8"))
          validation["placeholders"] = []
          validation["configuration"] = {
              "production_url": production + "/",
              "gpt_url": production_gpt,
              "vercel_root_directory": "site",
              "git_auto_deployments": "disabled for all branches; enable main explicitly when ready"
          }
          validation_path.write_text(json.dumps(validation, indent=2) + "\n", encoding="utf-8")

          site_map_path = Path("site/data/site-map.json")
          site_map = json.loads(site_map_path.read_text(encoding="utf-8"))
          for page in site_map.get("pages", []):
              path = page.get("path", "")
              if path == "/site/index.html":
                  page["path"] = "/"
              elif path.startswith("/site/"):
                  page["path"] = path[len("/site"):]
          site_map_path.write_text(json.dumps(site_map, indent=2) + "\n", encoding="utf-8")

          vercel = {
              "$schema": "https://openapi.vercel.sh/vercel.json",
              "framework": None,
              "installCommand": "",
              "git": {
                  "deploymentEnabled": {
                      "*": False,
                      "main": False
                  }
              },
              "headers": [
                  {
                      "source": "/api/actions/public",
                      "headers": [
                          {"key": "Cache-Control", "value": "no-store"},
                          {"key": "X-Content-Type-Options", "value": "nosniff"}
                      ]
                  }
              ]
          }
          Path("site/vercel.json").write_text(json.dumps(vercel, indent=2) + "\n", encoding="utf-8")

          workflow = Path(".github/workflows/configure-production-urls.yml")
          if workflow.exists():
              workflow.unlink()
          PY

      - name: Validate replacements and static files
        shell: bash
        run: |
          if grep -RIn --exclude-dir=.git -E 'YOUR-VERCEL-DOMAIN|REPLACE-WITH-FUNDING-DATA-ROOM-COPILOT' .; then
            echo "Placeholder validation failed."
            exit 1
          fi
          node --check site/script.js
          python - <<'PY'
          from pathlib import Path
          import json
          for path in Path(".").rglob("*.json"):
              if ".git" not in path.parts:
                  json.loads(path.read_text(encoding="utf-8"))
          for path in [Path("site/index.html"), *Path("site/pages").glob("*.html"), *Path("site/tools").glob("*.html")]:
              text = path.read_text(encoding="utf-8")
              assert "https://funding-data-room-copilot.vercel.app/site/" not in text
              assert "https://funding-data-room-copilot.vercel.app//" not in text
          print("Production URL validation passed.")
          PY

      - name: Commit configured production files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: configure production URLs and deployment guard"
          git push origin HEAD:chore/configure-production-urls-and-deploy-guard
